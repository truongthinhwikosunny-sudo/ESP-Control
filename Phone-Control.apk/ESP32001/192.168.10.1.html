<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>ESP32 Control</title><style>body { font-family: Arial; text-align: center; background: #f4f4f4; padding-top: 50px; }.btn { padding: 15px 30px; font-size: 18px; color: white; border: none; border-radius: 5px; margin: 10px; }.on { background: #4CAF50; }.off { background: #f44336; }.card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }</style><script>function sendCmd(pin, state){fetch('/control?pin=' + pin + '&state=' + state).then(res => res.text()).then(data => console.log(data));}</script></head><body><h1>ESP32 Control Panel</h1><div class='card'><h3>GPIO 23</h3><button class='btn on' onclick="sendCmd(23,'on')">ON</button><button class='btn off' onclick="sendCmd(23,'off')">OFF</button><hr><h3>GPIO 18</h3><button class='btn on' onclick="sendCmd(18,'on')">ON</button><button class='btn off' onclick="sendCmd(18,'off')">OFF</button></div></body></html>
